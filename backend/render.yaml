services:
  - type: web
    name: contract-review-api
    env: docker
    repo: https://github.com/YueyangZhu/contract-review.git
    branch: master
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres.<project_ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres"
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: mock
      - key: FRONTEND_URL
        value: "*"
      - key: UPLOAD_DIR
        value: /app/uploads
